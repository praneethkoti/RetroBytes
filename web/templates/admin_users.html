{{ define "admin_users" }}{{ template "header" . }}
<p class="kicker">Admin</p>
<h1>Users</h1>
<p><a href="/admin">Back to admin home</a></p>
<div class="table-wrap">
<table class="table">
  <tr><th>Email</th><th>Name</th><th>Role</th><th>Action</th></tr>
  {{ range .Users }}
  <tr>
    <td>{{ .Email }}</td>
    <td>{{ .Name }}</td>
    <td>{{ .Role }}</td>
    <td>
      <form method="post" action="/admin/users/{{ .ID }}/delete" class="inline-form"
            onsubmit="return confirm('Delete {{ .Email }}? This removes the user and their wishlist and cancels their orders. This cannot be undone.');">
        <input type="hidden" name="csrf" value="{{ $.CSRFToken }}">
        <button type="submit" class="btn danger">Delete</button>
      </form>
    </td>
  </tr>
  {{ end }}
</table>
</div>
{{ template "footer" . }}{{ end }}
